services:
  ec-issuer:
    platform: "linux/amd64"
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SSI_AGENT_URL=http://mock-ssi-agent:4010 # Internal URL
      - AWARDS_SERVICE_URL=http://mock-awards:4010
      - POSTGRES_CONNECTION_STRING=postgresql://ecissuer:ecissuer@postgresql:5432/ecissuer
      - ALLOWED_CORS_DOMAINS=http://localhost:8080,http://localhost:3000
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - ./src:/app/src/
    working_dir: /app

  real-ssi-agent:
    platform: "linux/amd64"
    image: cr.surf.nl/edubadges-educredentials/ssi-agent:latest
    ports:
      - "3033:3033"
    environment:
      UNICORE__PROFILE: development
      UNICORE__APPLICATION_URL: http://localhost:3033
      UNICORE__PUBLIC_URL: http://localhost:8000
      UNICORE__EVENT_STORE__TYPE: in_memory
      UNICORE__SECRET_MANAGER__STRONGHOLD_PASSWORD: very-secret-secure_password
      UNICORE__METRICS__ENABLED: false
      UNICORE__DID_METHODS__DID_JWK__ENABLED: true
      UNICORE__DID_METHODS__DID_JWK__PREFERRED: true
      UNICORE__DID_METHODS__DID_KEY__ENABLED: true
      UNICORE__DID_METHODS__DID_WEB__ENABLED: true

  mock-ssi-agent:
    platform: "linux/amd64"
    image: stoplight/prism:4
    ports:
      - "8001:4010"
    command: mock -h 0.0.0.0 /app/mock.yaml
    volumes:
      - ./dependencies/prism/ssi-agent-mock.yaml:/app/mock.yaml

  mock-oidc-auth:
    platform: "linux/amd64"
    image: stoplight/prism:4
    ports:
      - "8002:4010"
    command: mock -h 0.0.0.0 /app/mock.yaml
    volumes:
      - ./dependencies/prism/oidc-auth-mock.yaml:/app/mock.yaml

  mock-awards:
    platform: "linux/amd64"
    image: stoplight/prism:4
    ports:
      - "8003:4010"
    command: mock -h 0.0.0.0 /app/mock.yaml
    volumes:
      - ./dependencies/prism/awards-mock.yaml:/app/mock.yaml

  postgresql:
    platform: "linux/amd64"
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ecissuer
      - POSTGRES_PASSWORD=ecissuer
      - POSTGRES_DB=ecissuer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecissuer -d ecissuer"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgresql_data:/var/lib/postgresql/data

volumes:
  postgresql_data:
