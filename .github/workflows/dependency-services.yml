name: Build third party services containers on github container registry

on:
  push:
    branches: [main]
    tags: ["*"]

# Set permissions for GITHUB_TOKEN
permissions:
  contents: read
  packages: write

jobs:
  build-platypus:
    name: "Build Platypus, the mock ssi-agent used in CI and tests"
    runs-on: ubuntu-latest
    if: contains(github.event.paths, 'dependencies/platypus/Dockerfile') || contains(github.event.paths, 'dependencies/platypus/ssi-agent-mock.yaml')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: dependencies/platypus
          file: dependencies/platypus/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}-platypus:latest
