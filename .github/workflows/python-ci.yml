name: Python CI/CD

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Typecheck, Unit Test, Integration Test
    runs-on: ubuntu-latest
    services:
      mock-ssi-agent:
        image: ghcr.io/${{ github.repository }}-platypus:latest
        ports:
          - "8001:8001"
        command: "--server.port 8001 --server.host 0.0.0.0 --mock /app/mock.yaml"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.9.26

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run linting
        run: uv run ruff check .

      - name: Run type checking
        run: uv run basedpyright .

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Start ec-issuer service
        run: |
          export PYTHONUNBUFFERED=1
          export SERVER_HOST=0.0.0.0
          export SERVER_PORT=8000
          export ISSUER_AGENT_BASE_URL=http://localhost:8001
          export PUBLIC_URL=http://localhost:8000
          export DEBUG_METRICS=1
          RUNNER_TRACKING_ID="" && (nohup uv run python -m src.main &)
          sleep 1

      - name: Run integration tests
        run: |
          export SERVER_HOST=0.0.0.0
          export SERVER_PORT=8000
          export ISSUER_AGENT_BASE_URL=http://localhost:8001
          uv run pytest tests/e2e/ -v

      - name: Cleanup
        if: always()
        run: pkill -f "python -m src.main" || true


  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    # Only run on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Log in to SDP Container Registry "Harbor"
        uses: docker/login-action@v4
        with:
          registry: cr.surf.nl
          username: ${{ secrets.CR_SURF_USERNAME }}
          password: ${{ secrets.CR_SURF_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from pyproject.toml
        id: version
        run: echo "VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Get Git tag if available
        id: git_tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "GIT_TAG=git-tag-${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "HAS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cr.surf.nl/edubadges-educredentials/ec-issuer:latest
            cr.surf.nl/edubadges-educredentials/ec-issuer:${{ steps.version.outputs.VERSION }}
            ${{ steps.git_tag.outputs.HAS_TAG == 'true' && format('cr.surf.nl/edubadges-educredentials/ec-issuer:{0}', steps.git_tag.outputs.GIT_TAG) || '' }}
