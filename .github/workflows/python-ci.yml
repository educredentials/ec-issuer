name: Python CI/CD

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Typecheck, Unit Test, Integration Test
    runs-on: ubuntu-latest
    services:
      postgresql:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecissuer
          POSTGRES_PASSWORD: ecissuer
          POSTGRES_DB: ecissuer
        ports:
          - "5432:5432"
        options: --health-cmd="pg_isready -U ecissuer -d ecissuer" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Start mock SSI agent
        run: |
          docker run -d \
            --name mock-ssi-agent \
            -p 8001:4010 \
            -v ${{ github.workspace }}/dependencies/prism/ssi-agent-mock.yaml:/app/mock.yaml \
            stoplight/prism:4 mock -h 0.0.0.0 /app/mock.yaml

      - name: Start mock OIDC auth
        run: |
          docker run -d \
            --name mock-oidc-auth \
            -p 8002:4010 \
            -v ${{ github.workspace }}/dependencies/prism/oidc-auth-mock.yaml:/app/mock.yaml \
            stoplight/prism:4 mock -h 0.0.0.0 /app/mock.yaml

      - name: Start mock awards service
        run: |
          docker run -d \
            --name mock-awards \
            -p 8003:4010 \
            -v ${{ github.workspace }}/dependencies/prism/awards-mock.yaml:/app/mock.yaml \
            stoplight/prism:4 mock -h 0.0.0.0 /app/mock.yaml

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.9.26

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run linting
        run: uv run ruff check .

      - name: Run type checking
        run: uv run basedpyright .

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Run integration tests
        env:
          SSI_AGENT_URL: http://localhost:8001
          POSTGRES_CONNECTION_STRING: postgresql://ecissuer:ecissuer@localhost:5432/ecissuer
        run: uv run pytest tests/integration/ -v

      - name: Start ec-issuer service
        run: |
          export PYTHONUNBUFFERED=1
          export SERVER_HOST=0.0.0.0
          export SERVER_PORT=8000
          export SSI_AGENT_URL=http://localhost:8001
          export DEBUG_METRICS=1
          export POSTGRES_CONNECTION_STRING=postgresql://ecissuer:ecissuer@localhost:5432/ecissuer
          export AWARDS_SERVICE_URL=http://localhost:8003
          export ALLOWED_CORS_DOMAINS=http://localhost:8000,http://localhost:3000
          RUNNER_TRACKING_ID="" && (nohup uv run ec-issuer-web &)
          sleep 1

      - name: Run e2e tests
        env:
          SERVER_HOST: 0.0.0.0
          SERVER_PORT: 8000
          EC_ISSUER_URL: http://localhost:8000
          SSI_AGENT_URL: http://localhost:8001
          POSTGRES_CONNECTION_STRING: postgresql://ecissuer:ecissuer@localhost:5432/ecissuer
          AWARDS_SERVICE_URL: http://localhost:8003
          ALLOWED_CORS_DOMAINS: http://localhost:8000,http://localhost:3000
        run: uv run pytest tests/e2e/ -v

      - name: Cleanup
        if: always()
        run: |
          pkill -f "python -m src.main" || true
          docker stop mock-ssi-agent || true
          docker stop mock-oidc-auth || true
          docker stop mock-awards || true
          docker rm mock-ssi-agent || true
          docker rm mock-oidc-auth || true
          docker rm mock-awards || true


  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    # When a commit or tag is pushed to main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v6

      - name: Log in to SDP Container Registry "Harbor"
        uses: docker/login-action@v4
        with:
          registry: cr.surf.nl
          username: ${{ secrets.CR_SURF_USERNAME }}
          password: ${{ secrets.CR_SURF_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from pyproject.toml
        id: version
        run: echo "VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Get Git tag if available
        id: git_tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "GIT_TAG=git-tag-${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "HAS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image (web service)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cr.surf.nl/edubadges-educredentials/ec-issuer:latest
            cr.surf.nl/edubadges-educredentials/ec-issuer:${{ steps.version.outputs.VERSION }}
            ${{ steps.git_tag.outputs.HAS_TAG == 'true' && format('cr.surf.nl/edubadges-educredentials/ec-issuer:{0}', steps.git_tag.outputs.GIT_TAG) || '' }}

      - name: Build and push Docker image (cli, init container)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: cli
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cr.surf.nl/edubadges-educredentials/ec-issuer-init:latest
            cr.surf.nl/edubadges-educredentials/ec-issuer-init:${{ steps.version.outputs.VERSION }}
            ${{ steps.git_tag.outputs.HAS_TAG == 'true' && format('cr.surf.nl/edubadges-educredentials/ec-issuer-init:{0}', steps.git_tag.outputs.GIT_TAG) || '' }}
