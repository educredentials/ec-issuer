---
endpoints:
  - path: "/.well-known/openid-credential-issuer"
    get:
      responses:
        - code: 200
          body: |
            {
                "credential_issuer": "https://agent.example.com",
                "credential_endpoint": "https://agent.example.com/credential",
                "authorization_servers": ["https://agent.example.com"],
                "nonce_endpoint": "https://agent.example.com/nonce",
                "credential_configurations_supported": {}
            }
  - path: "/nonce"
    post:
      responses:
        - code: 200
          body: |
            {
                "c_nonce": "obviously-not-nonce-but-should-be"
            }
  - path: "/credential"
    post:
      responses:
        - code: 200
          body: |
            {
                "credentials": [
                   {  "credential":  "eyJ0eXAiOiJkYytzZC1qd3QiLCJhbGciOiJFZERTQSJ9..UluIttlczEFBB6sQIXdyFGKozxDxMllyh01E6TKuGK3NzDfM1Os7ArEjW8fw0w9mi-UGkhLyEnKkf4-10k41CQ" }
                ]
            }
